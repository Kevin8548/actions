name: Run Python Script
on:
push:
pull_request:
workflow_dispatch:
schedule:
  - cron: '0 12 * * *'  # Todos los días a las 12:00 UTC
jobs:
    runs-python-script:
      runs-on: ubuntu-latest
      steps:
        - name: Inicio
          run: echo "Comienza Action"
        - name: Clona repo
          uses: actions/checkout@v6
        - name: Muestra archivos
          run: ls -la
        - name: Definir variable
          run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
        - name: Ejecuta Script
          run: python app.py

    runs-javascript-script:
      runs-on: ubuntu-latest
      steps:
        - name: Inicio
          run: echo "Comienza Action"
        - name: Clona repo
          uses: actions/checkout@v6
        - name: Muestra archivos
          run: ls -la
        - name: Definir variable
          run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
        - name: Ejecuta Script
          run: node app.js